{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | AADHI Events &amp; Entertainments</title>
<meta name="description" content="Sign in to your AADHI Events & Entertainments account to manage your Bengaluru Corporate Wellness Run registration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
<link rel="icon" type="image/png" href="{% static 'media/aadhi-logo-nav.png' %}">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to home
    </a>

    <div class="auth-card glass">
      <a href="index.html">
        <img src="{% static 'media/aadhi-logo-nav.png' %}" alt="AADHI Events &amp; Entertainments" class="auth-logo">
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to manage your registration</p>

      <form class="auth-form" id="signinForm" novalidate>
        <div class="form-row">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" name="email" placeholder="you@company.com" required>
          <span class="form-error" data-for="email"></span>
        </div>

        <div class="form-row">
          <label for="si-password">Password</label>
          <input type="password" id="si-password" name="password" placeholder="Enter your password" required>
          <span class="form-error" data-for="password"></span>
        </div>

        <div class="auth-row-between">
          <label class="auth-check"><input type="checkbox" name="remember"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary full ripple">Sign In</button>
        <p class="form-success" id="formSuccess" role="status">Signed in successfully — welcome back!</p>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

<script src="{% static 'aadhi-api.js' %}"></script>
<script src="{% static 'auth.js' %}"></script>
</body>
</html>
